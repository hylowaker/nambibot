<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nambibot · 로그인</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-wrap {
      width: 100%;
      max-width: 360px;
    }

    /* 헤더와 동일한 봇 프로필 블록 */
    .login-profile {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .login-avatar-wrap {
      width: 38px;
      height: 38px;
      flex-shrink: 0;
    }
    .login-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(96,128,255,0.7);
      box-shadow: 0 0 0 3px rgba(96,128,255,0.2), 0 0 12px rgba(96,128,255,0.3);
      display: block;
    }
    .login-avatar-fallback {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 2px solid rgba(96,128,255,0.6);
      box-shadow: 0 0 0 3px rgba(96,128,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }
    .login-profile-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
      flex: 1;
      min-width: 0;
    }
    .login-profile-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--accent2);
      line-height: 1;
    }
    .login-profile-name {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 카드 내부 */
    .login-card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(32px) saturate(180%);
      -webkit-backdrop-filter: blur(32px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: var(--radius);
      padding: 24px 20px 20px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
    }
    .login-card h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .login-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }
    .login-field label {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 500;
    }
    .login-field input[type="password"] {
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: #fff;
      padding: 9px 12px;
      font-size: 0.95rem;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.07);
    }
    .login-field input[type="password"]:focus {
      border-color: rgba(96,128,255,0.55);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.07), 0 0 0 3px rgba(96,128,255,0.15);
    }

    .login-submit {
      width: 100%;
    }

    .login-error {
      display: none;
      margin-top: 12px;
      padding: 9px 12px;
      border-radius: 10px;
      background: rgba(255,50,80,0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,80,100,0.3);
      color: #ffb0ba;
      font-size: 0.85rem;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .login-error.visible { display: block; }

    .caps-warn {
      font-size: 0.75rem;
      color: rgba(255,200,50,0.8);
      margin-top: 6px;
    }

    @keyframes shake {
      0%        { transform: translateX(0); }
      15%       { transform: translateX(-8px); }
      35%       { transform: translateX(7px); }
      55%       { transform: translateX(-5px); }
      75%       { transform: translateX(4px); }
      90%       { transform: translateX(-2px); }
      100%      { transform: translateX(0); }
    }
    .login-card.shake {
      animation: shake 0.45s ease;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-profile">
      <div class="login-avatar-wrap">
        <img id="login-avatar" class="login-avatar" alt="" style="display:none">
        <span id="login-avatar-fallback" class="login-avatar-fallback">🎵</span>
      </div>
      <div class="login-profile-text">
        <span class="login-profile-label">BOT</span>
        <span id="login-profile-name" class="login-profile-name">nambibot</span>
      </div>
      <span id="conn-badge" class="err">오프라인</span>
    </div>

    <div class="login-card">
<form id="login-form">
        <div class="login-field">
          <label for="password">비밀번호</label>
          <input type="password" id="password" name="password"
                 autocomplete="current-password" autofocus>
          <div class="caps-warn" id="caps-warn" style="display:none">⚠ Caps Lock이 켜져 있습니다</div>
        </div>
        <button type="submit" class="btn-primary login-submit">로그인</button>
        <div class="login-error" id="login-error">비밀번호가 올바르지 않습니다.</div>
      </form>
    </div>
  </div>

<script src="/favicon-util.js"></script>
<script src="/login.js"></script>
</body>
</html>
