<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nambibot · Music</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <div class="bot-profile">
      <div class="bot-avatar-wrap">
        <img id="bot-avatar" class="bot-avatar" alt="" style="display:none">
        <span id="bot-avatar-fallback" class="bot-avatar-fallback">🎵</span>
      </div>
      <div class="bot-profile-text">
        <span class="bot-profile-label">BOT</span>
        <h1 id="bot-name">nambibot</h1>
      </div>
      <span id="conn-badge" class="err">오프라인</span>
    </div>

    <div class="header-divider"></div>

    <div class="guild-profile">
      <img id="guild-icon" class="guild-icon" alt="" style="display:none">
      <div class="guild-profile-text">
        <span class="guild-profile-label">SERVER</span>
        <div class="guild-select-wrap">
          <select id="guild-select"><option value="">서버 선택...</option></select>
          <span id="guild-lock" class="guild-lock" style="display:none">🔒</span>
        </div>
      </div>
    </div>

    <a href="/logs" class="nav-logs-btn" title="시스템 로그" target="_blank" rel="noopener">📋 로그</a>
  </header>

  <div class="layout">
    <div class="col-main">


      <div class="card" id="card-now-playing">
        <h2>Now Playing</h2>
        <div class="now-playing-body">

          <div class="cd idle" id="cd-icon">
            <div class="cd-groove"></div>
            <div class="cd-label"></div>
            <div class="cd-hole"></div>
          </div>

          <div class="now-playing-info">
            <div id="now-playing-title" class="now-playing-title idle"><div class="track-title">재생 중인 항목 없음</div><span class="track-url" style="visibility:hidden">&nbsp;</span></div>
            <div id="now-playing-sub" class="now-playing-sub" style="visibility:hidden">&nbsp;</div>
            <div id="play-progress" class="play-progress" style="visibility:hidden">
              <div class="play-progress-bar-track">
                <div id="play-progress-fill" class="play-progress-fill"></div>
                <div id="seek-tooltip" class="seek-tooltip" style="display:none"></div>
              </div>
              <div class="play-progress-times">
                <span id="play-progress-current">0:00</span>
                <span id="play-progress-duration"></span>
              </div>
            </div>
            <div class="controls" style="visibility:hidden">
              <button class="btn-secondary" id="btn-pause">⏸ 일시정지</button>
              <button class="btn-primary"   id="btn-resume" style="display:none">▶ 재개</button>
              <button class="btn-primary"   id="btn-skip">⏭ 스킵</button>
              <button class="btn-danger"    id="btn-delete-current">✕ 삭제</button>
            </div>
            <div id="now-playing-hint" class="now-playing-hint" style="visibility:hidden">&nbsp;</div>
          </div>
        </div>
      </div>


      <div class="card">
        <div class="queue-header">
          <h2>대기열 <span id="queue-count" class="queue-count"></span></h2>
          <div class="queue-header-actions">
            <button class="btn-secondary btn-sm" id="btn-shuffle">🔀 섞기</button>
            <button class="btn-secondary btn-sm" id="btn-dedupe">✦ 중복 제거</button>
            <button class="btn-secondary btn-sm" id="btn-save-playlist" title="현재 대기열을 플레이리스트로 저장">💾 저장</button>
            <button class="btn-secondary btn-sm" id="btn-load-playlist" title="저장된 플레이리스트 불러오기">📂 불러오기</button>
            <button class="btn-danger btn-sm" id="btn-purge">전체 삭제</button>
          </div>
        </div>
        <div class="queue-search">
          <input type="text" id="input-search" placeholder="🔍 제목으로 검색..." autocomplete="off">
        </div>
        <ol id="queue-list" class="queue-list">
          <li class="queue-empty">대기열이 비어있습니다.</li>
        </ol>
      </div>


      <div class="card" id="card-add-queue">
        <h2>대기열에 추가</h2>
        <div id="add-queue-hint" class="add-queue-hint" style="display:none"></div>
        <form class="url-form" id="form-queue">
          <input type="text" id="input-url" placeholder="🔗 YouTube / SoundCloud URL 또는 플레이리스트 URL" autocomplete="off">
          <button type="submit" class="btn-secondary" id="btn-queue">대기열 추가</button>
          <button type="button" class="btn-primary" id="btn-play-now">바로 재생</button>
        </form>
        <div id="queue-progress" class="queue-progress" style="display:none"></div>
      </div>

    </div>


    <div class="col-side">
      <div class="card voice-card">
        <h2>음성 채널</h2>

        <div class="voice-content">


          <div id="voice-connected-banner" class="voice-connected-banner" style="display:none">
            <span id="vbanner-icon" class="vbanner-icon">🔊</span>
            <span id="voice-channel-name" class="vbanner-name"></span>
            <button class="btn-danger btn-sm" id="btn-leave">퇴장</button>
          </div>


          <div id="voice-disc-msg" class="voice-disc-msg">연결되지 않음</div>


          <div class="voice-channel-select-wrap">
            <select id="select-channel" class="voice-channel-select">
              <option value="">채널 선택하여 참가...</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card card-history">
        <h2>재생 히스토리 <span id="history-count" class="queue-count"></span></h2>
        <ol id="history-list" class="history-list">
          <li class="history-empty">재생 기록이 없습니다.</li>
        </ol>
      </div>
    </div>
  </div>


  <button id="fab-listen" class="fab-listen" title="브라우저에서 듣기">
    <svg class="fab-cast-svg" viewBox="3 10.5 26 14" fill="none">
      <path class="fab-cast-band" d="M3 17 C3 6.5, 29 6.5, 29 17" stroke-width="2.4" stroke-linecap="round"/>
      <rect class="fab-cast-ear fab-cast-ear-l" x="0.5" y="15.5" width="5" height="8.5" rx="2"/>
      <rect class="fab-cast-ear fab-cast-ear-r" x="26.5" y="15.5" width="5" height="8.5" rx="2"/>
      <rect class="fab-cast-win" x="7.5" y="13.5" width="17" height="12" rx="2.5"/>
      <line class="fab-cast-bar" x1="10.5" y1="17" x2="21.5" y2="17" stroke-width="1" stroke-linecap="round"/>
      <circle class="fab-cast-dot" cx="10.5" cy="17" r="1"/>
      <!-- active: eq bars inside window -->
      <rect class="fab-cast-eq" x="11" y="21" width="1.8" height="3" rx="0.5"/>
      <rect class="fab-cast-eq" x="14" y="19.5" width="1.8" height="4.5" rx="0.5"/>
      <rect class="fab-cast-eq" x="17" y="20.5" width="1.8" height="3.5" rx="0.5"/>
      <rect class="fab-cast-eq" x="20" y="21.5" width="1.8" height="2.5" rx="0.5"/>
      <line class="fab-cast-slash" x1="4" y1="26" x2="28" y2="10" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>
  <div id="web-player" class="web-player">
    <div class="web-player-header">
      <span class="web-player-title">브라우저 재생</span>
    </div>
    <div class="web-player-body">
      <div id="web-player-track" class="web-player-track">재생 중인 곡 없음</div>
      <div class="web-player-controls">
        <input type="range" id="web-player-volume" class="web-player-volume" min="0" max="100" value="50" title="볼륨">
        <span id="web-player-vol-label" class="web-player-vol-label">50%</span>
      </div>
      <div id="web-player-status" class="web-player-status"></div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <div id="offline-overlay">
    <div class="offline-card">
      <div class="offline-icon">⚡</div>
      <div class="offline-title">서버 재연결 실패</div>
      <div class="offline-desc">서버에 연결할 수 없습니다.<br>계속 재연결을 시도하고 있습니다.</div>
      <div class="offline-attempts" id="offline-attempts"></div>
    </div>
  </div>

  <div class="page-footer" id="page-footer"></div>

<script src="/socket.io/socket.io.js"></script>
  <script src="/favicon-util.js"></script>
  <script src="/crypto-util.js"></script>
  <script src="/app.js"></script>
</body>
</html>
